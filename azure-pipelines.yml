trigger:
  branches:
    include:
      - main
      - work

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'

stages:
  - stage: Build
    jobs:
      - job: Install
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: docker compose config
            displayName: Validate Docker Compose configuration

  - stage: Validate
    dependsOn: Build
    jobs:
      - job: SemanticValidation
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: make validate
            displayName: RDF syntax and SHACL validation

  - stage: Test
    dependsOn: Validate
    jobs:
      - job: UnitTests
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: make verify
            displayName: Run Phase 1 verification
