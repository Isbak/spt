trigger:
  branches:
    include:
      - main
      - work

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'

stages:
  - stage: Build
    jobs:
      - job: Install
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: docker compose config
            displayName: Validate Docker Compose configuration

  - stage: Validate
    dependsOn: Build
    jobs:
      - job: SemanticValidation
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: |
              make validate
              make orchestration
              make execution-plans
              make approvals
              make events
            displayName: RDF syntax, SHACL, and orchestration metadata validation
          - script: make governance
            displayName: Validate governance metadata
          - script: make provenance
            displayName: Validate provenance traces
          - script: make named-graphs
            displayName: Validate named graph manifest
          - script: make mappings
            displayName: Validate mapping definitions
          - script: make source-catalog
            displayName: Validate semantic source catalog
          - script: make import-csv
            displayName: Validate CSV import workflow
          - script: make import-sql
            displayName: Validate SQL import workflow
          - script: make lineage
            displayName: Validate mapping lineage queries
          - script: make reasoning
            displayName: Validate reasoning execution
          - script: make inference
            displayName: Validate inferred graph generation
          - script: make consistency
            displayName: Validate consistency report
          - script: make explanations
            displayName: Validate explanation generation
          - script: make rules
            displayName: Validate reasoning rules
          - script: make graph ontology governance-dashboard provenance-dashboard reasoning-dashboard analytics search
            displayName: Validate dashboard generation, visualization metadata, analytics, and search
          - script: make agents agent-registry agent-memory agent-provenance agent-observability
            displayName: Validate agent registry, permissions, governance, provenance, memory, and observability

  - stage: Test
    dependsOn: Validate
    jobs:
      - job: UnitTests
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: make verify
            displayName: Run Phase 7 verification
