trigger:
  branches:
    include:
      - main
      - work

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'

stages:
  # NOTE: Keep these stages in lock-step with .github/workflows/ci.yml. Both
  # pipelines are thin wrappers that call the same Makefile targets so they
  # cannot drift. The actual list of checks lives only in the Makefile
  # (`ci-validate`), never inline here.
  - stage: Build
    jobs:
      - job: Install
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: make lint
            displayName: Lint (ruff)
          - script: docker compose config
            displayName: Validate Docker Compose configuration

  - stage: Validate
    dependsOn: Build
    jobs:
      - job: SemanticValidation
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: make ci-validate
            displayName: Run all semantic validation checks, including collaboration ontology, delegation rules, consensus logic, conflict resolution, provenance, execution checks, and tests

  - stage: Test
    dependsOn: Validate
    jobs:
      - job: UnitTests
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: make setup
            displayName: Install Python dependencies
          - script: make test query
            displayName: Run tests and SPARQL query checks
