services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: semantic-platform-fuseki
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-}
      FUSEKI_DATASET_1: ${FUSEKI_DATASET:-semantic-platform}
    ports:
      - "3030:3030"
    volumes:
      - fuseki-data:/fuseki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030/"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: semantic-platform-web
    env_file:
      - .env.example
    environment:
      FUSEKI_BASE_URL: http://fuseki:3030
      FUSEKI_DATASET: ${FUSEKI_DATASET:-semantic-platform}
    ports:
      - "5000:5000"
    depends_on:
      fuseki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fuseki-data:
