services:
  fuseki:
    # Thin wrapper over stain/jena-fuseki that swaps in a dev-bundle Shiro config
    # so the admin UI (dataset list) and Graph Store writes work through the
    # published port instead of being restricted to localhost. See
    # docker/fuseki/shiro.ini and ADR-0010.
    build: ./docker/fuseki
    container_name: semantic-platform-fuseki
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-admin}
      # Three per-role datasets (ADR-0017): system / agents+lineage / business. All run
      # locally in this container by default; point a role's FUSEKI_<ROLE>_BASE_URL at an
      # external Jena to place that role remotely instead.
      FUSEKI_DATASET_1: ${FUSEKI_SYSTEM_DATASET:-${FUSEKI_DATASET:-semantic-platform}}
      FUSEKI_DATASET_2: ${FUSEKI_AGENTS_DATASET:-semantic-platform-agents}
      FUSEKI_DATASET_3: ${FUSEKI_BUSINESS_DATASET:-semantic-platform-business}
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    volumes:
      - fuseki-data:/fuseki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030/"]
      interval: 10s
      timeout: 5s
      retries: 10

  flask:
    build: .
    container_name: semantic-platform-flask
    environment:
      SEMANTIC_PLATFORM_ROOT: /app
      # Shared default for any role whose own FUSEKI_<ROLE>_BASE_URL is unset.
      FUSEKI_BASE_URL: http://fuseki:3030
      FUSEKI_USERNAME: ${FUSEKI_USERNAME:-}
      FUSEKI_PASSWORD: ${FUSEKI_PASSWORD:-}
      # Per-role datasets/placement (ADR-0017). Set FUSEKI_<ROLE>_BASE_URL to point a role
      # at an external Jena, and SOURCE_<ROLE>_DATABASE_URL at an external warehouse.
      FUSEKI_SYSTEM_DATASET: ${FUSEKI_SYSTEM_DATASET:-${FUSEKI_DATASET:-semantic-platform}}
      FUSEKI_AGENTS_DATASET: ${FUSEKI_AGENTS_DATASET:-semantic-platform-agents}
      FUSEKI_BUSINESS_DATASET: ${FUSEKI_BUSINESS_DATASET:-semantic-platform-business}
      FUSEKI_AGENTS_BASE_URL: ${FUSEKI_AGENTS_BASE_URL:-}
      FUSEKI_BUSINESS_BASE_URL: ${FUSEKI_BUSINESS_BASE_URL:-}
      SOURCE_BUSINESS_DATABASE_URL: ${SOURCE_BUSINESS_DATABASE_URL:-${SOURCE_DATABASE_URL:-}}
      SOURCE_AGENTS_DATABASE_URL: ${SOURCE_AGENTS_DATABASE_URL:-}
      FLASK_HOST: 0.0.0.0
      ORCHESTRATION_ENABLED: "true"
      EXECUTION_ENABLED: "true"
      EXECUTION_API_ENABLED: "true"
      EXECUTION_DASHBOARD_ENABLED: "true"
      FLASK_PORT: 5000
      AGENT_API_ENABLED: "true"
      AGENT_OBSERVABILITY_ENABLED: "true"
      MULTI_AGENT_ENABLED: "true"
      COLLABORATION_API_ENABLED: "true"
      COLLABORATION_DASHBOARD_ENABLED: "true"
      FABRIC_SERVICES_ENABLED: "true"
      CATALOG_SERVICES_ENABLED: "true"
      FEDERATION_SERVICES_ENABLED: "true"
      ENTERPRISE_PORTAL_ENABLED: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_MODEL: ${LLM_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      fuseki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: semantic-platform-postgres
    profiles: ["integration"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-semantic_platform}
      POSTGRES_USER: ${POSTGRES_USER:-semantic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semantic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./mappings/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./mappings/sql/sample_data.sql:/docker-entrypoint-initdb.d/02-sample-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-semantic} -d $${POSTGRES_DB:-semantic_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Self-contained local LLM for the governed agent assist — a free, no-API-key
  # alternative to external cloud providers, in the spirit of the bundled Fuseki.
  # Opt-in via the `llm` profile: `docker compose --profile llm up -d` (or
  # `make docker-up-llm`), then pull a model: `docker exec semantic-platform-ollama
  # ollama pull ${LLM_MODEL:-llama3.2}`. Select it with LLM_PROVIDER=ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: semantic-platform-ollama
    profiles: ["llm"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fuseki-data:
  postgres-data:
  ollama-data:
