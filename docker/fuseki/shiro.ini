# Apache Shiro configuration for the bundled LOCAL DEVELOPMENT Fuseki.
#
# The upstream image restricts the admin endpoints (/$/**) to localhost. When
# Fuseki runs in a container and you reach it through Docker's published port,
# requests arrive from the Docker gateway address — not 127.0.0.1 — so the admin
# API is denied. Two visible symptoms follow: the web UI's dataset list hangs
# forever on "Loading…", and Graph Store writes (the `make load-fuseki` upload)
# fail with HTTP 401.
#
# This dev-bundle config opens every endpoint to any client so the bundled
# Fuseki is usable through the published port. It is intentionally permissive
# and MUST NOT be used for a publicly reachable / production Fuseki — there,
# keep the upstream localhost restriction (or real authentication) instead.

[main]
ssl.enabled = false

plainMatcher = org.apache.shiro.authc.credential.SimpleCredentialsMatcher
iniRealm.credentialsMatcher = $plainMatcher

[users]
# The password is injected from the ADMIN_PASSWORD env var by the image
# entrypoint (envsubst) on first container start.
admin = ${ADMIN_PASSWORD}

[roles]

[urls]
# Dev bundle: every endpoint is reachable through the published port.
/$/status = anon
/$/ping   = anon
/$/**     = anon
/**       = anon
