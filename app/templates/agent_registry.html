{% extends "base.html" %}
{% block title %}Agent Registry{% endblock %}
{% block content %}<h2>Agent Registry</h2><table><tr><th>Agent</th><th>Version</th><th>Status</th><th>Capabilities</th></tr>{% for agent in agents %}<tr><td>{{ agent.label }}</td><td>{{ agent.version }}</td><td>{{ agent.status.value }}</td><td>{{ agent.capabilities|join(', ') }}</td></tr>{% endfor %}</table>{% endblock %}
