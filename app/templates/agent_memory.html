{% extends "base.html" %}
{% block title %}Agent Memory{% endblock %}
{% block content %}<h2>Agent Memory</h2><table><tr><th>Agent</th><th>Type</th><th>Content</th></tr>{% for row in rows %}<tr><td>{{ row.agent_id }}</td><td>{{ row.memory_type.value }}</td><td>{{ row.content }}</td></tr>{% else %}<tr><td colspan="3">No runtime memory recorded yet.</td></tr>{% endfor %}</table>{% endblock %}
