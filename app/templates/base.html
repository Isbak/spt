<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Semantic Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  </head>
  <body>
    <header>
      <h1>Semantic Platform</h1>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('health.health_view') }}">Health</a>
        <a href="{{ url_for('graph.index') }}">Graphs</a>
        <a href="{{ url_for('ontology.index') }}">Ontology</a>
        <a href="{{ url_for('query.index') }}">Query</a>
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
